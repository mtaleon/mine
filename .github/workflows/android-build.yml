name: Android Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode release keystore
        if: startsWith(github.ref, 'refs/tags/')
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app
          if [ -n "$KEYSTORE_BASE64" ]; then
            printf '%s' "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore 2>/dev/null \
              || printf '%s' "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
            test -s android/app/release.keystore || (echo "ERROR: decoded keystore missing/empty" && exit 1)
            echo "Keystore decoded successfully"
          else
            echo "ERROR: No KEYSTORE_BASE64 secret found"
            exit 1
          fi

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build signed release APK
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Build signed release AAB (Play Store)
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload release APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: error

      - name: Upload release AAB
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 90
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: artifacts/

      - name: Download release AAB
        uses: actions/download-artifact@v4
        with:
          name: app-release-bundle
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          body: |
            ## Android Release

            **Play Store**: Upload the `.aab` file to Play Console (manual upload required)
            **Sideload**: Install the `.apk` file directly

            ⚠️ Note: Creating this GitHub Release does NOT publish to Google Play.
            The `.aab` must still be uploaded manually to Play Console.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
