  <rect x="30" y="30" width="4" height="12" fill="#c0392b" transform="rotate(45 32 36)"/>
  <rect x="66" y="30" width="4" height="12" fill="#c0392b" transform="rotate(-45 68 36)"/>
  <rect x="30" y="58" width="4" height="12" fill="#c0392b" transform="rotate(-45 32 64)"/>
